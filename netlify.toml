[build]
  command = "npm run build"
  publish = "dist"

[dev]
  framework = "vite"
  targetPort = 5173

[[edge_functions]]
  path = "/api/chat"
  function = "chat"

[[edge_functions]]
  path = "/api/sessions"
  function = "sessions"

[[edge_functions]]
  path = "/api/sessions/*"
  function = "sessions"

[[edge_functions]]
  path = "/api/objectives"
  function = "objectives"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
